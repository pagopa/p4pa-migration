migration-files:
  page-request-thresholds:
    warn: "\${MIGRATION_FILES_PAGE_REQUEST_THRESHOLDS_WARN: 100}"
    error: "\${MIGRATION_FILES_PAGE_REQUEST_THRESHOLDS_ERROR: 1000}"

folders:
  shared: "\${SHARED_FOLDER_ROOT:/shared}"
  tmp: "\${TMP_FOLDER:/tmp}"
  process-target-sub-folders:
    archive: "\${PROCESS_TARGET_SUB_FOLDER_ARCHIVE:archive}"
    errors: "\${PROCESS_TARGET_SUB_FOLDER_ERRORS:errors}"
  migration-file-type-paths:
    ORGANIZATIONS: "migration-data/organizations"
    ORG_SIL_SERVICES: "migration-data/org-sil-service"
    DEBT_POSITIONS_TYPE: "migration-data/debt-positions-type"
    DEBT_POSITIONS_TYPE_ORG: "migration-data/debt-positions-type-org"
    DEBT_POSITIONS_TYPE_ORG_OPERATORS: "migration-data/debt-positions-type-org-operators"
    PAYMENTS_REPORTING: "migration-data/payments-reporting"
    PAYMENT_NOTIFICATION: "migration-data/payment-notification"
    TREASURY_CSV_COMPLETE: "migration-data/treasury-csv-complete"
    ASSESSMENTS: "migration-data/assessments"
    ASSESSMENTS_REGISTRY: "migration-data/assessments-registry"
    DEBT_POSITIONS_PAID: "migration-data/debt-positions-paid"


encryption:
  file-encrypt-password: "\${FILE_ENCRYPT_PASSWORD:ENCR_PSW}"

csv:
  separator: "\${CSV_SEPARATOR_CHAR:;}"
  quote-char: "\${CSV_QUOTE_CHAR:\\\"}"

zip-file:
  max-entries: "\${ZIP_MAX_ENTRIES:1000}"
  max-uncompressed-size: "\${ZIP_MAX_UNCOMPRESSED_SIZE:52428800}" # 50MB
  max-compression-ratio: "\${ZIP_MAX_COMPRESSION_RATIO:100}" # Allowing file having at most a compression ratio 100:1

rest:
  defaults:
    connection-pool:
      size: "\${DEFAULT_REST_CONNECTION_POOL_SIZE:10}"
      size-per-route: "\${DEFAULT_REST_CONNECTION_POOL_SIZE_PER_ROUTE:5}"
      time-to-live-minutes: "\${DEFAULT_REST_CONNECTION_POOL_TIME_TO_LIVE_MINUTES:10}"
    timeout:
      connect-millis: "\${DEFAULT_REST_TIMEOUT_CONNECT_MILLIS:120000}"
      read-millis: "\${DEFAULT_REST_TIMEOUT_READ_MILLIS:120000}"
  auth:
    base-url: "\${AUTH_BASE_URL:}"
    max-attempts: "\${AUTH_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${AUTH_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${AUTH_PRINT_BODY_WHEN_ERROR:true}"
    post-token:
      client_secret: "\${AUTH_CLIENT_SECRET:clientsecret}"
  process-executions:
    base-url: "\${PROCESS_EXECUTIONS_BASE_URL:}"
    max-attempts: "\${PROCESS_EXECUTIONS_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${PROCESS_EXECUTIONS_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${PROCESS_EXECUTIONS_PRINT_BODY_WHEN_ERROR:true}"
  fileshare:
    base-url: "\${FILE_SHARE_BASE_URL:}"
    max-attempts: "\${FILE_SHARE_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${FILE_SHARE_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${FILE_SHARE_PRINT_BODY_WHEN_ERROR:true}"
  organization:
    base-url: "\${ORGANIZATION_BASE_URL:http://localhost:8080}"
    max-attempts: "\${ORGANIZATION_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${ORGANIZATION_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${ORGANIZATION_PRINT_BODY_WHEN_ERROR:true}"
  debt-position:
    base-url: "\${DEBT_POSITION_BASE_URL:http://localhost:8080}"
    max-attempts: "\${DEBT_POSITION_MAX_ATTEMPTS:3}" # It's counting also the first attempt
    wait-time-millis: "\${DEBT_POSITION_WAIT_TIME_MILLIS:500}"
    print-body-when-error: "\${DEBT_POSITION_PRINT_BODY_WHEN_ERROR:true}"



workflow:
  default:
    startToCloseTimeoutInSeconds: "\${DEFAULT_ACTIVITY_CONFIG_START_TO_CLOSE_TIMEOUT_IN_SECONDS:300}"
    retryInitialIntervalInMillis: "\${DEFAULT_ACTIVITY_CONFIG_RETRY_INITIAL_INTERVAL_IN_MILLIS:1000}"
    retryBackoffCoefficient: "\${DEFAULT_ACTIVITY_CONFIG_RETRY_BACKOFF_COEFFICIENT:1.5}"
    retryMaximumAttempts: "\${DEFAULT_ACTIVITY_CONFIG_RETRY_MAXIMUM_ATTEMPTS:30}"

  # migration data
  migration-data-ingestion:
    start-to-close-timeout-in-seconds: "\${MIGRATION_ACTIVITY_CONFIG_START_TO_CLOSE_TIMEOUT_IN_SECONDS:\${workflow.default.startToCloseTimeoutInSeconds}}"
    retry-initial-interval-in-millis: "\${MIGRATION_ACTIVITY_CONFIG_RETRY_INITIAL_INTERVAL_IN_MILLIS:\${workflow.default.retryInitialIntervalInMillis}}"
    retry-backoff-coefficient: "\${MIGRATION_ACTIVITY_CONFIG_RETRY_BACKOFF_COEFFICIENT:\${workflow.default.retryBackoffCoefficient}}"
    retry-maximum-attempts: "\${MIGRATION_ACTIVITY_CONFIG_RETRY_MAXIMUM_ATTEMPTS:\${workflow.default.retryMaximumAttempts}}"
